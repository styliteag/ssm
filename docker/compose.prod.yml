# Production deployment for the all-in-one image.
#
# Build context is the repository root so the multi-stage Dockerfile can pull
# both ``frontend/`` and ``backend/`` from the checkout. The container serves
# the React SPA on port 80 and reverse-proxies ``/api/*`` to uvicorn internally.

services:
  ssm:
    container_name: ssm
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
      args:
        VITE_API_URL: /api
    image: ssm:latest
    ports:
      - "80:80"
    volumes:
      - ./data/db:/app/db
      - ./data/config:/app/config
      - ./data/keys:/app/keys
      - ./data/logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:////app/db/ssm.db
      - HTPASSWD=config/.htpasswd
      - SSH_KEY=keys/id_ssm
      # JWT_SECRET MUST be set; uncomment and supply a 32+ char value:
      # - JWT_SECRET=replace-me-with-a-long-random-string
      - LOGLEVEL=info
    networks:
      - ssm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/health-check.sh"]
      start_period: 30s
      timeout: 10s
      interval: 30s
      retries: 3

networks:
  ssm-network:
    driver: bridge
